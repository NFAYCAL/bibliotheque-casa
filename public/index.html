<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>bibliothèque-casa</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <div class="brand">
        <div class="brand__logo">BC</div>
        <div>
          <h1 class="brand__name">bibliothèque-casa</h1>
          <p class="brand__tag">Informatique • Cuisine • Sport • Voiture</p>
        </div>
      </div>
      <nav class="nav">
        <a href="#catalogue">Catalogue</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2>Découvre, emprunte, apprends.</h2>
      <p class="muted">Site vitrine + API Node/Express (données en mémoire).</p>
      <div class="stats">
        <div class="stat"><div id="statBooks" class="stat__value">—</div><div class="stat__label">Livres</div></div>
        <div class="stat"><div id="statCategories" class="stat__value">—</div><div class="stat__label">Catégories</div></div>
      </div>
    </section>

    <section id="catalogue" class="section">
      <div class="controls">
        <input id="searchInput" class="search" type="search" placeholder="Rechercher (titre, auteur, tags)..." />
        <div class="filters">
          <button class="chip chip--active" data-filter="Tous">Tous</button>
          <button class="chip" data-filter="Informatique">Informatique</button>
          <button class="chip" data-filter="Cuisine">Cuisine</button>
          <button class="chip" data-filter="Sport">Sport</button>
          <button class="chip" data-filter="Voiture">Voiture</button>
        </div>
      </div>

      <div id="bookGrid" class="grid"></div>

      <div id="emptyState" class="empty" hidden>
        Aucun résultat.
        <button id="resetBtn" class="btn">Réinitialiser</button>
      </div>
    </section>

    <section id="contact" class="section">
      <h3>Contact</h3>
      <p class="muted">Formulaire simulé (front only).</p>
      <form id="contactForm" class="form">
        <input name="name" required placeholder="Nom" />
        <input name="email" type="email" required placeholder="Email" />
        <textarea name="message" rows="4" required placeholder="Message..."></textarea>
        <button class="btn btn--primary" type="submit">Envoyer</button>
        <p id="formHint" class="muted"></p>
      </form>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__overlay" data-close="true"></div>
    <div class="modal__content">
      <button class="modal__close" data-close="true">✕</button>
      <h3 id="modalTitle">—</h3>
      <p id="modalMeta" class="muted">—</p>
      <p id="modalDesc">—</p>
      <div id="modalTags" class="tags"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
